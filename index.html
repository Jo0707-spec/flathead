<!doctype html>
<html lang="de">
 
<head>
  <meta charset="utf-8" />
  <title>Flathead Control Center</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Flathead Control Center</h1>
  </header>

  <main class="layout">
    <nav class="menu">
      <button class="menu-btn active" data-target="dashboard">1) Sensor-Daten Dashboard</button>
      <button class="menu-btn" data-target="location">2) Aufenthaltsort des Raspberrys</button>
      <button class="menu-btn" data-target="camera">3) Live Kamera Feed</button>
    </nav>

    <section id="dashboard" class="panel active">
      <div class="panel-header">
        <h2>Sensor-Daten Dashboard</h2>
      </div>

      <div class="grid-cards">
        <article class="card">
          <h3>Temperatur</h3>
          <p>Außen: <strong id="temp-out">--</strong> °C</p>
          <p>Innen: <strong id="temp-in">--</strong> °C</p>
        </article>

        <article class="card">
          <h3>Himmelsrichtung</h3>
          <p>Richtung: <strong id="heading">--</strong></p>
        </article>

        <article class="card">
          <h3>Luftfeuchtigkeit</h3>
          <p>Außen: <strong id="hum-out">--</strong> %</p>
          <p>Innen: <strong id="hum-in">--</strong> %</p>
        </article>

        <article class="card">
          <h3>Distanz</h3>
          <p><strong id="distance">--</strong> cm</p>
        </article>
      </div>

      <div class="status-row">
        <span id="sensor-status">Warte auf Sensordaten …</span>
        <span id="last-updated">--</span>
      </div>
    </section>

    <section id="location" class="panel">
      <div class="panel-header">
        <h2>Standort</h2>
      </div>

      <article class="card">
        <p>Lat: <strong id="lat">--</strong></p>
        <p>Lng: <strong id="lng">--</strong></p>
      </article>
    </section>

    <section id="camera" class="panel">
      <div class="panel-header">
        <h2>Kamera</h2>
      </div>

      <article class="card">
        <img id="camera-feed" src="" />
      </article>
    </section>
  </main>

  <!-- 🔥 FIREBASE SCRIPT -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcjgVtCEZGSOepoX4c5mBsZ0UtbjvTEpU",
      authDomain: "flathead-d96d6.firebaseapp.com",
      databaseURL: "https://flathead-d96d6-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "flathead-d96d6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const sensorRef = ref(db, 'sensor');

    onValue(sensorRef, (snapshot) => {
      const data = snapshot.val();

      if (!data) return;

      // 🔥 Werte einsetzen
      document.getElementById("temp-out").innerText = data.temperature;
      document.getElementById("temp-in").innerText = data.temperature;

      document.getElementById("hum-out").innerText = data.humidity;
      document.getElementById("hum-in").innerText = data.humidity;

      document.getElementById("distance").innerText = data.distance || "--";

      // Status
      document.getElementById("sensor-status").innerText = "LIVE DATEN";
      document.getElementById("last-updated").innerText = new Date().toLocaleTimeString();
    });
  </script>
 <script type="module" src="app.js"></script>
</body>
</html>
