<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboter Telemetrie Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-12 text-center mb-5">
                <h1 class="text-white display-4">🤖 Roboter Telemetrie</h1>
                <p class="text-white-50">Live-Daten von LoRa 868 MHz</p>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-3 mb-4">
                <div class="card bg-glass text-white shadow-lg">
                    <div class="card-body text-center">
                        <h2 id="temp" class="display-4">23.4</h2>
                        <p class="mb-0">°C</p>
                        <small>Temperatur</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card bg-glass text-white shadow-lg">
                    <div class="card-body text-center">
                        <h2 id="hum" class="display-4">42.1</h2>
                        <p class="mb-0">%</p>
                        <small>Luftfeuchte</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card bg-glass text-white shadow-lg">
                    <div class="card-body text-center">
                        <h2 id="bat" class="display-4">3.75</h2>
                        <p class="mb-0">V</p>
                        <small>Akku</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card bg-glass text-white shadow-lg">
                    <div class="card-body text-center">
                        <h2 id="status" class="display-4">🟢</h2>
                        <p class="mb-0">Online</p>
                        <small>Status</small>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <canvas id="chart" height="200"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Demo-Daten (später echte LoRa-Daten)
        let tempData = [23.1, 23.4, 23.2, 23.6, 23.8];
        let humData = [42.0, 42.1, 41.9, 42.3, 42.5];
        
        // Chart.js Temperatur‑Chart
        new Chart(document.getElementById('chart'), {
            type: 'line',
            data: {
                labels: ['-20s', '-15s', '-10s', '-5s', 'Jetzt'],
                datasets: [{
                    label: 'Temperatur (°C)',
                    data: tempData,
                    borderColor: '#ff6b6b',
                    backgroundColor: 'rgba(255,107,107,0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: false } }
            }
        });
        
        // Simulierte Live‑Updates
        setInterval(() => {
            document.getElementById('temp').textContent = (23 + Math.random()).toFixed(1);
            document.getElementById('hum').textContent = (42 + Math.random()*2).toFixed(1);
            document.getElementById('bat').textContent = (3.7 + Math.random()*0.1).toFixed(2);
        }, 2000);
    </script>
</body>
</html>
